<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 720px;
    }

    .input-group {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
    }

    input[type="text"]::placeholder { color: #475569; }

    button {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      margin: 32px auto 0;
      width: 36px;
      height: 36px;
      border: 3px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results {
      display: none;
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .results.hidden { display: none; }

    .section {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #2d3148;
      background: #161825;
    }

    .section-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-outline  { background: #6366f1; }
    .dot-notes    { background: #a855f7; }
    .dot-summary  { background: #ec4899; }

    .section-header span {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .section-body {
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.75;
      color: #cbd5e1;
    }

    .section-body ul { padding-left: 20px; margin: 6px 0; }
    .section-body li { margin: 4px 0; }
    .section-body p  { margin: 6px 0; }
    .section-body h1, .section-body h2, .section-body h3 {
      color: #e2e8f0;
      margin: 12px 0 6px;
    }

    .error {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      background: #2a1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      color: #fca5a5;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Note Generator</h1>
    <p>Enter a topic and get a structured outline, detailed notes, and a summary.</p>
  </header>

  <div class="card">
    <div class="input-group">
      <input type="text" id="topicInput" placeholder="e.g. Quantum Computing, The Roman Empire..." />
      <button id="generateBtn" onclick="generateNote()">Generate</button>
    </div>

    <div class="spinner" id="spinner"></div>
    <div class="error" id="error"></div>

    <div class="results hidden" id="results">
      <div class="section">
        <div class="section-header">
          <div class="dot dot-outline"></div>
          <span>Outline</span>
        </div>
        <div class="section-body" id="outline"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="dot dot-notes"></div>
          <span>Notes</span>
        </div>
        <div class="section-body" id="notes"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="dot dot-summary"></div>
          <span>Summary</span>
        </div>
        <div class="section-body" id="summary"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/generate_note';

    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^\s*\*\s+(.+)$/gm, '<li>$1</li>')
        .replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/^(?!<[hul]|<\/[hul]|<li|<p)(.+)$/gm, '<p>$1</p>');
    }

    async function generateNote() {
      const topic = document.getElementById('topicInput').value.trim();
      if (!topic) return;

      const btn     = document.getElementById('generateBtn');
      const spinner = document.getElementById('spinner');
      const results = document.getElementById('results');
      const error   = document.getElementById('error');

      btn.disabled = true;
      spinner.style.display = 'block';
      results.classList.add('hidden');
      error.style.display = 'none';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: topic }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();

        document.getElementById('outline').innerHTML = renderMarkdown(data.outline);
        document.getElementById('notes').innerHTML   = renderMarkdown(data.notes);
        document.getElementById('summary').innerHTML = renderMarkdown(data.summary);

        results.classList.remove('hidden');
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    document.getElementById('topicInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateNote();
    });
  </script>

</body>
</html>
